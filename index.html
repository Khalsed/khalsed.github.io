<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⏱️ Accedez à votre Planning - AREAS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --areas-orange: #FF8C00;
            --areas-navy: #1a2642;
            --areas-light-bg: #f5f3f0;
            --areas-text: #1a1a1a;
            --areas-light-text: #666;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--areas-light-bg) 0%, #fafaf8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo img {
            width: 200px;
            height: auto;
            display: block;
        }

        h1 {
            color: var(--areas-text);
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--areas-light-text);
            font-size: 1.1em;
            font-weight: 400;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(26, 38, 66, 0.1);
            max-width: 700px;
            width: 100%;
            padding: 45px 35px;
        }

        .site-section {
            margin-bottom: 35px;
            padding-bottom: 35px;
            border-bottom: 1px solid #e8e6e3;
        }

        .site-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .site-title {
            text-align: center;
            color: var(--areas-navy);
            margin-bottom: 18px;
            font-size: 1.4em;
            font-weight: 600;
        }

        .access-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .access-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            background: var(--areas-orange);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.95em;
            border: 2px solid var(--areas-orange);
            min-width: 160px;
            box-shadow: 0 4px 12px rgba(255, 140, 0, 0.15);
        }

        .access-link:hover {
            background: var(--areas-navy);
            border-color: var(--areas-navy);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(26, 38, 66, 0.2);
        }

        .access-link.navy {
            background: var(--areas-navy);
            border-color: var(--areas-navy);
            box-shadow: 0 4px 12px rgba(26, 38, 66, 0.15);
        }

        .access-link.navy:hover {
            background: var(--areas-orange);
            border-color: var(--areas-orange);
            box-shadow: 0 6px 16px rgba(255, 140, 0, 0.2);
        }

        .footer {
            text-align: center;
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid #e8e6e3;
            color: var(--areas-light-text);
            font-size: 1.1em;
            font-weight: 500;
        }

        .footer-note {
            text-align: center;
            margin-top: 15px;
            color: #999;
            font-size: 0.85em;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .subtitle {
                font-size: 0.95em;
            }

            .container {
                padding: 30px 20px;
            }

            .site-title {
                font-size: 1.2em;
            }

            .access-link {
                min-width: 140px;
                padding: 12px 20px;
                font-size: 0.9em;
            }

            .access-links {
                gap: 10px;
            }

            .logo img {
                width: 160px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5em;
            }

            .container {
                padding: 20px 15px;
            }

            .site-section {
                margin-bottom: 25px;
                padding-bottom: 25px;
            }

            .site-title {
                font-size: 1.1em;
            }

            .access-links {
                flex-direction: column;
                gap: 8px;
            }

            .access-link {
                width: 100%;
                min-width: unset;
            }

            .logo img {
                width: 120px;
            }
        }
    </style>
</head>
<body>

                </div>
